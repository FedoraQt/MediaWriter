name: release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'
      - 'v[0-9]*.[0-9]*.[0-9]*'
  release:
    types: [ created ]

env:
    QT_VERSION: '6.10.2'

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Extract tag
        id: tag
        run: |
          TAG=$(bash ./dist/get-tag-name.sh)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create release (if not exists)
        run: |
          if ! gh release view "${{ steps.tag.outputs.tag }}" &>/dev/null; then
            gh release create "${{ steps.tag.outputs.tag }}" \
              --title "AcreetionOS Media Writer ${{ steps.tag.outputs.tag }}" \
              --notes "Release ${{ steps.tag.outputs.tag }}

          $(git log --oneline --no-merges $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD | sed 's/^/- /')" \
              --prerelease
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  Linux:
    needs: create-release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Set env (TAG_NAME)
        run: echo "TAG_NAME=$(bash ./dist/get-tag-name.sh)" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y liblzma-dev libfuse2

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{env.QT_VERSION}}
          cache: true
          cache-key-prefix: ${{ github.job }}-qt

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build --parallel

      - name: Create AppImage
        run: |
          set -eo pipefail
          DESTDIR=$(pwd)/AppDir cmake --install build

          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage

          export LDAI_OUTPUT="AcreetionOSMediaWriter-linux-x86_64-${{ env.TAG_NAME }}.AppImage"
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --plugin qt --output appimage

      - name: Create DEB
        run: |
          set -eo pipefail
          TAG="${{ env.TAG_NAME }}"
          VERSION_STRIPPED=$(sed "s/-.*//" <<< "$TAG")
          if [[ "$VERSION_STRIPPED" == "" ]]; then
            VERSION_STRIPPED=5.3.50
          fi

          DEB_DIR=deb-staging
          DESTDIR=$(pwd)/$DEB_DIR cmake --install build

          INSTALLED_SIZE=$(du -sk $DEB_DIR | cut -f1)

          mkdir -p $DEB_DIR/DEBIAN
          cat > $DEB_DIR/DEBIAN/control << DEBCTRL
          Package: acreetionos-mediawriter
          Version: ${VERSION_STRIPPED}
          Architecture: amd64
          Maintainer: Natalie Spiva <natalie@acreetionos.org>
          Installed-Size: ${INSTALLED_SIZE}
          Section: utils
          Priority: optional
          Homepage: https://gitlab.acreetionos.org/natalie/AcreetionMediaWriter
          Depends: libc6, liblzma5, libglib2.0-0, qml6-module-qtqml, qml6-module-qtqml-models, qml6-module-qtquick-controls, qml6-module-qtquick-layouts, qml6-module-qtquick-window, qml6-module-qtquick-dialogs, hicolor-icon-theme
          Recommends: polkitd, udisks2
          Description: AcreetionOS Media Writer - Write AcreetionOS images to portable drives
           A tool to create a bootable live USB drive with an edition of AcreetionOS.
           It can automatically download the required image and write it to a USB
           flash drive. Also supports restoring the drive back to normal afterwards.
           .
           Based on Fedora Media Writer by the Fedora Project.
          DEBCTRL

          dpkg-deb --build $DEB_DIR "AcreetionOSMediaWriter-linux-x86_64-$TAG.deb"

      - name: Upload AppImage to GitHub (release)
        run: |
          bash dist/upload-to-github.sh github_api_token=${{ secrets.GITHUB_TOKEN }} tag="${{ env.TAG_NAME }}" filename="AcreetionOSMediaWriter-linux-x86_64-${{ env.TAG_NAME }}.AppImage"

      - name: Upload DEB to GitHub (release)
        run: |
          bash dist/upload-to-github.sh github_api_token=${{ secrets.GITHUB_TOKEN }} tag="${{ env.TAG_NAME }}" filename="AcreetionOSMediaWriter-linux-x86_64-${{ env.TAG_NAME }}.deb"

  Flatpak:
    needs: create-release
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:kde-6.10
      options: --privileged
    steps:
      - uses: actions/checkout@v6

      - name: Set env (TAG_NAME)
        run: echo "TAG_NAME=$(bash ./dist/get-tag-name.sh)" >> $GITHUB_ENV

      - uses: bilelmoussaoui/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: "org.acreetionos.MediaWriter.flatpak"
          manifest-path: "dist/flatpak/org.acreetionos.MediaWriter.json"
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Upload to GitHub (release)
        run: |
          bash dist/upload-to-github.sh github_api_token=${{ secrets.GITHUB_TOKEN }} tag="${{ env.TAG_NAME }}" filename="org.acreetionos.MediaWriter.flatpak"

  RPM:
    needs: create-release
    runs-on: ubuntu-latest
    container: fedora:41
    steps:
      - uses: actions/checkout@v6

      - name: Set env (TAG_NAME)
        run: echo "TAG_NAME=$(bash ./dist/get-tag-name.sh)" >> $GITHUB_ENV

      - name: Install build dependencies
        run: |
          dnf install -y cmake make gcc-c++ gettext \
            qt6-qtbase-devel qt6-qtdeclarative-devel qt6-qtsvg-devel \
            xz-devel desktop-file-utils rpm-build

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build --parallel

      - name: Create RPM
        run: |
          set -eo pipefail
          TAG="$TAG_NAME"
          VERSION_STRIPPED=$(sed "s/-.*//" <<< "$TAG")
          if [[ "$VERSION_STRIPPED" == "" ]]; then
            VERSION_STRIPPED=5.3.50
          fi

          DESTDIR=$(pwd)/rpm-staging cmake --install build

          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

          cat > ~/rpmbuild/SPECS/acreetionos-mediawriter.spec << RPMSEC
          Name:           acreetionos-mediawriter
          Version:        ${VERSION_STRIPPED}
          Release:        1
          Summary:        AcreetionOS Media Writer
          License:        GPL-2.0+
          URL:            https://gitlab.acreetionos.org/natalie/AcreetionMediaWriter

          %description
          A tool to write images of AcreetionOS media to portable drives
          like flash drives or memory cards.

          %install
          :

          %files
          %{_bindir}/mediawriter
          %{_libexecdir}/mediawriter/
          %{_datadir}/applications/org.acreetionos.MediaWriter.desktop
          %{_datadir}/metainfo/org.acreetionos.MediaWriter.metainfo.xml
          %{_datadir}/icons/hicolor/*/apps/org.acreetionos.MediaWriter.png
          RPMSEC

          rpmbuild -bb \
            --buildroot "$(pwd)/rpm-staging" \
            --define "__spec_install_pre :" \
            ~/rpmbuild/SPECS/acreetionos-mediawriter.spec

          cp ~/rpmbuild/RPMS/x86_64/*.rpm "AcreetionOSMediaWriter-linux-x86_64-$TAG.rpm"

      - name: Upload RPM to GitHub (release)
        run: |
          bash dist/upload-to-github.sh github_api_token=${{ secrets.GITHUB_TOKEN }} tag="${{ env.TAG_NAME }}" filename="AcreetionOSMediaWriter-linux-x86_64-${{ env.TAG_NAME }}.rpm"

  macOS:
    needs: create-release
    strategy:
      matrix:
        arch: [x86_64, arm64]
        include:
          - arch: x86_64
            runner: macos-15-intel
            dmg_arch_suffix: ""
          - arch: arm64
            runner: macos-15
            dmg_arch_suffix: "-arm64"
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Set env (TAG_NAME)
        run: echo "TAG_NAME=$(bash ./dist/get-tag-name.sh)" >> $GITHUB_ENV

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{env.QT_VERSION}}
          modules: qtimageformats
          cache: true
          cache-key-prefix: ${{ github.job }}-${{ matrix.arch }}-qt

      - name: Build
        run: |
          set -eo pipefail
          mkdir build
          cd build
          if [ "${{ matrix.arch }}" == "x86_64" ]; then
            cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="${{ matrix.arch }}"
          else
            cmake .. -DCMAKE_BUILD_TYPE=Release
          fi
          cmake --build . --parallel

      - name: Bundle
        run: |
          set -eo pipefail
          "$QT_ROOT_DIR"/bin/macdeployqt build/src/app/AcreetionOSMediaWriter.app -qmldir=src/app/qml -executable=build/src/app/AcreetionOSMediaWriter.app/Contents/MacOS/helper
          # No idea why but macdeployqt deploys debug libs too, just remove them, maybe fix this sometimes
          for i in `find build/src/app/AcreetionOSMediaWriter.app/ -name '*.dSYM'`; do rm -fr "$i"; done
          cd build/src/app/
          "$QT_ROOT_DIR"/bin/macdeployqt AcreetionOSMediaWriter.app -dmg -always-overwrite
          mv AcreetionOSMediaWriter.dmg ../../../AcreetionOSMediaWriter-macos${{ matrix.dmg_arch_suffix }}-${{ env.TAG_NAME }}.dmg 2>/dev/null || mv "AcreetionOS Media Writer.dmg" ../../../AcreetionOSMediaWriter-macos${{ matrix.dmg_arch_suffix }}-${{ env.TAG_NAME }}.dmg

      - name: Upload artifact (for direct download from workflow)
        uses: actions/upload-artifact@v6
        with:
          # Use the dmg_arch_suffix for the artifact name
          name: AcreetionOSMediaWriter-macos${{ matrix.dmg_arch_suffix }}-${{ env.TAG_NAME }}.dmg
          path: AcreetionOSMediaWriter-macos${{ matrix.dmg_arch_suffix }}-${{ env.TAG_NAME }}.dmg

      - name: Upload to GitHub (release)
        run: |
          set -eo pipefail
          # Pass the full filename including the architecture suffix
          bash dist/upload-to-github.sh github_api_token=${{ secrets.GITHUB_TOKEN }} tag="${{ env.TAG_NAME }}" filename="AcreetionOSMediaWriter-macos${{ matrix.dmg_arch_suffix }}-${{ env.TAG_NAME }}.dmg"

  Windows-MSVC:
    needs: create-release
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set env
        run: echo "TAG_NAME=$(bash ./dist/get-tag-name.sh)" >> $env:GITHUB_ENV

      - name: Install dependencies
        shell: bash
        run: |
          choco install nsis
          choco install dos2unix
          choco install cmake

      - name: Set up CPM cache
        id: cache-cpm
        uses: actions/cache@v4
        with:
          path: ~/cpm-cache
          key: ${{ runner.os }}-cpm-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-cpm-

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{env.QT_VERSION}}
          arch: win64_msvc2022_64
          cache: true
          cache-key-prefix: ${{ github.job }}-qt

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build xz-utils
        shell: bash
        if: ${{ !steps.cache-qt.outputs.cache-hit }}
        run: |
          eval "$(./dist/win/make-vs2022-env.bat)"
          git clone https://git.tukaani.org/xz.git
          cd xz
          git checkout v5.4.5
          sed -i 's/#include "config.h"//' src/common/common_w32res.rc
          sed -i 's/PACKAGE_NAME/"liblzma"/' src/common/common_w32res.rc
          sed -i 's/PACKAGE_URL/"https:\/\/tukaani.org\/xz\/"/' src/common/common_w32res.rc
          mkdir build
          cd build
          export CPM_SOURCE_CACHE=~/cpm-cache
          export CMAKE_PREFIX_PATH="$QT_ROOT_DIR"/lib/cmake
          "/c/Program Files/CMake/bin/cmake.exe" .. -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="$QT_ROOT_DIR" -DBUILD_SHARED_LIBS=ON
          "/c/Program Files/CMake/bin/cmake.exe" --build . --config Release
          "/c/Program Files/CMake/bin/cmake.exe" --install . --config Release

      - name: Build MediaWriter
        shell: bash
        run: |
          eval "$(./dist/win/make-vs2022-env.bat)"
          mkdir build
          cd build
          export CPM_SOURCE_CACHE=~/cpm-cache
          export CMAKE_PREFIX_PATH="$QT_ROOT_DIR"/lib/cmake
          "/c/Program Files/CMake/bin/cmake.exe" .. -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="$QT_ROOT_DIR"
          "/c/Program Files/CMake/bin/cmake.exe" --build . --config Release
          "/c/Program Files/CMake/bin/cmake.exe" --install . --config Release

      - name: Windeployqt
        shell: bash
        run: |
          mkdir -p build/app/release
          cd build/app/release
          mv ../../src/app/helper.exe .
          mv ../../src/app/mediawriter.exe .
          cp $QT_ROOT_DIR/bin/liblzma.dll .
          $QT_ROOT_DIR/bin/windeployqt.exe mediawriter.exe helper.exe liblzma.dll --verbose 2 --qmldir ../../.. --compiler-runtime --release
          find . -type d -not -path '*/\.*' | sed 's/^\.\///g' | sed 's@\/@\\@g' | grep -v "^.$" > uninstall.log
          find . -type f -not -path '*/\.*' | sed 's/^\.\///g' | sed 's@\/@\\@g' | sort >> uninstall.log

      - name: Installer
        shell: bash
        run: |
          VERSION_STRIPPED=$(sed "s/-.*//" <<< "${{ env.TAG_NAME }}")
          if [[ "$VERSION_STRIPPED" == "" ]]; then
              VERSION_STRIPPED=5.2.50
          fi
          VERSION_MAJOR=$(cut -d. -f1 <<< "${VERSION_STRIPPED}")
          VERSION_MINOR=$(cut -d. -f2 <<< "${VERSION_STRIPPED}")
          VERSION_BUILD=$(cut -d. -f3 <<< "${VERSION_STRIPPED}")
          INSTALLED_SIZE=$(du -k -d0 "build/app/release" | cut -f1)

          cp "dist/win/mediawriter_native.nsi" "dist/win/mediawriter_native.tmp.nsi"

          sed -i "s/#!define VERSIONMAJOR/!define VERSIONMAJOR ${VERSION_MAJOR}/" "dist/win/mediawriter_native.tmp.nsi"
          sed -i "s/#!define VERSIONMINOR/!define VERSIONMINOR ${VERSION_MINOR}/" "dist/win/mediawriter_native.tmp.nsi"
          sed -i "s/#!define VERSIONBUILD/!define VERSIONBUILD ${VERSION_BUILD}/" "dist/win/mediawriter_native.tmp.nsi"
          sed -i "s/#!define INSTALLSIZE/!define INSTALLSIZE ${INSTALLED_SIZE}/" "dist/win/mediawriter_native.tmp.nsi"

          unix2dos < "LICENSE.GPL-2" > "build/app/release/LICENSE.GPL-2.txt"
          unix2dos < "LICENSE.LGPL-2" > "build/app/release/LICENSE.LGPL-2.txt"

          echo "LICENSE.GPL-2.txt" >> build/app/release/uninstall.log
          echo "LICENSE.LGPL-2.txt" >> build/app/release/uninstall.log

          mkdir -p dist/win/plugins
          curl -L -o NScurl.zip "https://github.com/negrutiu/nsis-nscurl/releases/download/v25.11.11.274/NScurl.zip"
          unzip -o NScurl.zip -d NScurl_temp
          cp NScurl_temp/Plugins/x86-unicode/NScurl.dll "dist/win/plugins/"
          rm -rf NScurl.zip NScurl_temp

          "/c/Program Files (x86)/NSIS/makensis.exe" -DCERTPATH="" -DCERTPASS="" dist/win/mediawriter_native.tmp.nsi
          mv dist/win/AMW-setup.exe ./"AcreetionOSMediaWriter-win64-${{ env.TAG_NAME }}.exe"

      - name: Portable
        shell: bash
        run: |
          # Remove uninstall.log as it's only needed for the installer
          rm -f build/app/release/uninstall.log

          mkdir -p AcreetionOSMediaWriter-portable
          cp -r build/app/release/* AcreetionOSMediaWriter-portable/

          7z a -tzip "AcreetionOSMediaWriter-win64-portable-${{ env.TAG_NAME }}.zip" ./AcreetionOSMediaWriter-portable/*

      - name: Upload Portable to GitHub (release)
        run: |
          bash dist/upload-to-github.sh github_api_token=${{ secrets.GITHUB_TOKEN }} tag="${{ env.TAG_NAME }}" filename="AcreetionOSMediaWriter-win64-portable-${{ env.TAG_NAME }}.zip"

      - name: Upload to GitHub (release)
        run: |
          bash dist/upload-to-github.sh github_api_token=${{ secrets.GITHUB_TOKEN }} tag="${{ env.TAG_NAME }}" filename="AcreetionOSMediaWriter-win64-${{ env.TAG_NAME }}.exe"

      - name: Publish to WinGet
        uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: AcreetionOS.AcreetionOSMediaWriter
          version: ${{ env.TAG_NAME }}
          token: ${{ secrets.WINGET_TOKEN }}
